<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>रोबोट वॉर्स - मास्टर गेम</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background-color: #2c3e50; color: white; user-select: none; touch-action: none; }
        
        /* --- मेनू और एडमिन स्क्रीन --- */
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; text-align: center; }
        #main-menu { display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #1a252f; }
        h1 { color: #f1c40f; text-shadow: 2px 2px 5px black; font-size: 35px; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 20px; font-weight: bold; border-radius: 10px; border: 2px solid white; cursor: pointer; width: 80%; max-width: 300px; box-shadow: 0px 5px 0px rgba(0,0,0,0.5); }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-play { background-color: #2ecc71; color: white; }
        .btn-admin { background-color: #e74c3c; color: white; }
        
        input { padding: 10px; font-size: 16px; border-radius: 5px; margin: 10px 0; width: 80%; max-width: 300px; }
        .admin-box { background: white; color: black; padding: 20px; border-radius: 10px; display: inline-block; width: 90%; max-width: 400px; margin-top: 50px; }

        /* --- गेम की दुनिया --- */
        #game-world { background-image: linear-gradient(to bottom, #4b7bec 50%, #38ada9 50%, #079992 100%); height: 65vh; position: relative; overflow: hidden; border-bottom: 5px solid #1e272e; }
        
        /* 🌟 ओरिजिनल फील: करैक्टर और दोस्त 🌟 */
        #hero, #enemy, .friend { 
            position: absolute; bottom: 20px; max-width: 80px; min-width: 60px; width: 15vw;
            transition: left 0.2s linear, transform 0.1s; 
            filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.4)); 
            animation: breathe 1.5s infinite alternate ease-in-out; /* साँस लेना */
        }
        #hero { left: 30%; z-index: 10; } 
        #enemy { right: 5%; animation-delay: 0.5s; }
        #friend1 { left: 10%; filter: hue-rotate(90deg) drop-shadow(0px 10px 5px rgba(0,0,0,0.4)); animation-delay: 0.2s; } 
        #friend2 { left: 50%; filter: hue-rotate(240deg) drop-shadow(0px 10px 5px rgba(0,0,0,0.4)); animation-delay: 0.7s; } 
        
        @keyframes breathe { 0% { transform: scaleY(1) translateY(0px); } 100% { transform: scaleY(0.95) translateY(3px); } }
        .walking { animation: walk 0.3s infinite alternate !important; }
        @keyframes walk { 0% { transform: rotate(-10deg) translateY(-5px); } 100% { transform: rotate(10deg) translateY(0px); } }

        /* --- UI और बॉर्डर्स --- */
        .friend-label { position: absolute; top: -20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.7); color: white; padding: 2px 4px; border-radius: 5px; font-size: 10px; white-space: nowrap; }
        .speech-bubble { position: absolute; bottom: 100px; background: white; color: black; padding: 5px 10px; border-radius: 10px; border: 2px solid black; font-weight: bold; font-size: 12px; opacity: 0; transition: 0.3s; z-index: 30; white-space: nowrap; }
        
        .health-container { background: rgba(0, 0, 0, 0.7); color: white; padding: 4px 8px; border-radius: 8px; font-weight: bold; font-size: 12px; border: 1px solid white; z-index: 20; }
        #hero-health-board { position: absolute; top: 40px; left: 5px; }
        #enemy-health-board { position: absolute; bottom: 100px; right: 5px; }
        progress { width: 60px; height: 10px; border-radius: 5px; }
        progress::-webkit-progress-value { background-color: #e74c3c; border-radius: 5px;}
        progress::-webkit-progress-bar { background-color: #ddd; border-radius: 5px;}

        #weapon-board { position: absolute; top: 5px; right: 5px; background: #f1c40f; color: #333; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; z-index: 20; }
        #score-board { position: absolute; top: 5px; left: 5px; background: rgba(0,0,0,0.7); color: white; padding: 5px 10px; border-radius: 5px; font-weight: bold; font-size: 12px; z-index: 20; text-align: left;}
        
        .item { position: absolute; bottom: 30px; font-size: 24px; z-index: 5; animation: pulse 1s infinite alternate; }
        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        /* --- मोबाइल कंट्रोल्स --- */
        #controls-area { height: 35vh; background: #1e272e; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .joystick-left { display: flex; gap: 10px; }
        .action-right { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; width: 50%; }
        .game-btn { border: 2px solid white; border-radius: 50%; color: white; width: 55px; height: 55px; font-size: 22px; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0 4px 6px rgba(0,0,0,0.3); background: rgba(255, 255, 255, 0.2); }
        .game-btn:active { transform: scale(0.9); background: rgba(255, 255, 255, 0.4); }
        .attack-btn { background: #e74c3c; width: 65px; height: 65px; font-size: 28px; } 
        .heal-btn { background: #2ecc71; } 
        .upgrade-btn { background: #9b59b6; } 
    </style>
</head>
<body>

    <div id="main-menu" class="screen" style="display: flex;">
        <h1>रोबोट वॉर्स 🤖</h1>
        <p>मल्टीप्लेयर एक्शन गेम</p>
        <button class="btn btn-play" onclick="tryStartGame()">🎮 गेम खेलें</button>
        <button class="btn btn-admin" onclick="showScreen('admin-login')">⚙️ एडमिन</button>
    </div>

    <div id="admin-login" class="screen">
        <div class="admin-box">
            <h2>एडमिन लॉगिन 🔐</h2>
            <input type="password" id="adminPass" placeholder="पासवर्ड (admin123)">
            <br>
            <button class="btn btn-admin" onclick="checkPassword()">लॉगिन</button>
            <button class="btn" style="background:gray; color:white;" onclick="showScreen('main-menu')">वापस</button>
        </div>
    </div>

    <div id="admin-dashboard" class="screen">
        <div class="admin-box">
            <h2>कंट्रोल रूम 👑</h2>
            <p>गेम स्टेटस: <strong id="lock-status" style="color: green;">खुला है 🟢</strong></p>
            <button class="btn btn-admin" onclick="toggleLock(true)">🔒 गेम लॉक करें</button>
            <button class="btn btn-play" onclick="toggleLock(false)">🔓 अनलॉक करें</button>
            <br>
            <button class="btn" style="background:gray; color:white;" onclick="showScreen('main-menu')">मेन मेनू</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="padding: 0;">
        <div id="game-world">
            <button style="position:absolute; top:40px; right:5px; z-index:30; background:red; color:white; border:none; padding:5px; border-radius:5px;" onclick="closeGame()">❌</button>
            
            <div id="score-board">
                <span style="color:gold;">🪙 कॉइन्स: <span id="coin-count">0</span></span><br>
                <span style="color:#ff7675;">💊 मेड किट: <span id="medkit-count">0</span></span>
            </div>
            
            <div id="hero-health-board" class="health-container">
                हीरो HP: <progress id="hero-hp-bar" value="100" max="100"></progress> <span id="hero-hp-text">100</span>
            </div>
            <div id="weapon-board">⚔️ तलवार (डैमेज: 15)</div>
            <div id="enemy-health-board" class="health-container">
                दुश्मन: <progress id="enemy-hp-bar" value="100" max="100"></progress> <span id="enemy-hp-text">100</span>
            </div>

            <div class="speech-bubble" id="bubble1" style="left: 10%;">चलो मारो!</div>
            <div class="speech-bubble" id="bubble2" style="left: 45%;">सब मिल कर!</div>

            <div class="item medkit" style="left: 60%;">💊</div>
            <div class="item coin" style="left: 75%;">🪙</div>

            <div id="friend1" class="friend"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=F1" style="width:100%;"><div class="friend-label">दोस्त 1</div></div>
            <img id="hero" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Ninja" alt="Hero">
            <div id="friend2" class="friend"><img src="https://api.dicebear.com/7.x/adventurer/svg?seed=F2" style="width:100%;"><div class="friend-label">दोस्त 2</div></div>
            <img id="enemy" src="https://api.dicebear.com/7.x/bottts/svg?seed=EvilBot" alt="Enemy">
        </div>

        <div id="controls-area">
            <div class="joystick-left">
                <div class="game-btn" ontouchstart="moveHero('left')" onmousedown="moveHero('left')" ontouchend="stopHero()" onmouseup="stopHero()">⬅️</div>
                <div class="game-btn" ontouchstart="moveHero('right')" onmousedown="moveHero('right')" ontouchend="stopHero()" onmouseup="stopHero()">➡️</div>
            </div>
            <div class="action-right">
                <div class="game-btn heal-btn" ontouchstart="healHero()" onmousedown="healHero()">💖</div>
                <div class="game-btn upgrade-btn" ontouchstart="upgradeWeapon()" onmousedown="upgradeWeapon()">⚒️</div>
                <div class="game-btn attack-btn" ontouchstart="heroAttack()" onmousedown="heroAttack()">⚔️</div>
            </div>
        </div>
    </div>

    <script>
        // --- एडमिन और स्क्रीन लॉजिक ---
        let isGameLocked = false;

        function openFullscreen() {
            let elem = document.documentElement;
            if (elem.requestFullscreen) elem.requestFullscreen();
            else if (elem.webkitRequestFullscreen) elem.webkitRequestFullscreen();
        }
        function closeFullscreen() {
            if (document.exitFullscreen) document.exitFullscreen();
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
        }

        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
            document.getElementById(screenId).style.display = screenId === 'main-menu' ? 'flex' : 'block';
        }

        function checkPassword() {
            if (document.getElementById('adminPass').value === "admin123") {
                showScreen('admin-dashboard'); document.getElementById('adminPass').value = ""; 
            } else alert("गलत पासवर्ड!");
        }

        function toggleLock(lockState) {
            isGameLocked = lockState;
            let statusText = document.getElementById('lock-status');
            statusText.innerHTML = isGameLocked ? "लॉक है 🔴" : "खुला है 🟢";
            statusText.style.color = isGameLocked ? "red" : "green";
        }

        function tryStartGame() {
            if (isGameLocked) alert("🚫 गेम एडमिन द्वारा लॉक है!");
            else { openFullscreen(); showScreen('game-screen'); startGameLogic(); }
        }

        function closeGame() {
            closeFullscreen(); showScreen('main-menu'); clearInterval(enemyAttackInterval);
        }

        // --- गेमप्ले लॉजिक ---
        let heroPosition = 30; 
        const heroEl = document.getElementById("hero");
        const enemyEl = document.getElementById("enemy");
        
        let heroHP = 100, enemyHP = 100, medkits = 0, heroDamage = 15, upgradeCost = 3, globalCoins = 0;
        let enemyAttackInterval;

        function startGameLogic() {
            heroHP = 100; enemyHP = 100; updateHeroHealth(); updateEnemyHealth();
            startEnemyAttack();
        }

        function moveHero(dir) {
            heroEl.classList.add('walking');
            if (dir === 'right' && heroPosition < 80) heroPosition += 5; 
            else if (dir === 'left' && heroPosition > 0) heroPosition -= 5; 
            heroEl.style.left = heroPosition + "%";
            checkItemsCollection(); 
        }

        function stopHero() { heroEl.classList.remove('walking'); }

        function checkItemsCollection() {
            let heroRect = heroEl.getBoundingClientRect();
            document.querySelectorAll('.item').forEach(item => {
                if (item.style.display !== 'none') {
                    let itemRect = item.getBoundingClientRect();
                    if (heroRect.right > itemRect.left && heroRect.left < itemRect.right) {
                        item.style.display = "none"; 
                        if (item.classList.contains('medkit')) {
                            medkits++; document.getElementById("medkit-count").innerText = medkits;
                        } else if (item.classList.contains('coin')) {
                            globalCoins++; document.getElementById("coin-count").innerText = globalCoins;
                        }
                    }
                }
            });
        }

        function healHero() {
            if (medkits > 0 && heroHP < 100) {
                medkits--; heroHP = Math.min(100, heroHP + 40);
                document.getElementById("medkit-count").innerText = medkits; updateHeroHealth();
                heroEl.style.filter = "drop-shadow(0px 0px 20px lime)";
                setTimeout(() => { heroEl.style.filter = "drop-shadow(0px 10px 5px rgba(0,0,0,0.4))"; }, 400);
            }
        }

        function upgradeWeapon() {
            if (globalCoins >= upgradeCost) {
                globalCoins -= upgradeCost; heroDamage += 15; upgradeCost += 2; 
                document.getElementById("coin-count").innerText = globalCoins;
                document.getElementById("weapon-board").innerText = `⚔️ (डैमेज: ${heroDamage})`;
                heroEl.style.transform = "scale(1.2)";
                setTimeout(() => { heroEl.style.transform = "scale(1)"; }, 400);
            } else alert(`अपग्रेड के लिए ${upgradeCost} कॉइन चाहिए!`);
        }

        function friendsCheer() {
            const bubbles = [document.getElementById("bubble1"), document.getElementById("bubble2")];
            const randomFriend = bubbles[Math.floor(Math.random() * bubbles.length)];
            randomFriend.style.opacity = 1; setTimeout(() => { randomFriend.style.opacity = 0; }, 1000);
        }

        function heroAttack() {
            let distance = enemyEl.getBoundingClientRect().left - heroEl.getBoundingClientRect().right;
            heroEl.style.transform = "rotate(20deg) translateX(10px)";
            setTimeout(() => { heroEl.style.transform = "rotate(0deg) translateX(0)"; }, 200);
            
            if (distance < 70 && enemyHP > 0) {
                enemyHP = Math.max(0, enemyHP - heroDamage); updateEnemyHealth();
                enemyEl.style.filter = "brightness(2) invert(1)";
                setTimeout(() => { enemyEl.style.filter = "drop-shadow(0px 10px 5px rgba(0,0,0,0.4))"; }, 200);
                friendsCheer();
            }
        }

        function startEnemyAttack() {
            clearInterval(enemyAttackInterval);
            enemyAttackInterval = setInterval(() => {
                if (enemyHP > 0 && heroHP > 0) {
                    let distance = enemyEl.getBoundingClientRect().left - heroEl.getBoundingClientRect().right;
                    if (distance > -30 && distance < 80) {
                        heroHP = Math.max(0, heroHP - 10); updateHeroHealth();
                        heroEl.style.transform = "translateX(-10px)"; 
                        setTimeout(() => { heroEl.style.transform = "scale(1)"; }, 300);
                    }
                }
            }, 1500);
        }

        function updateHeroHealth() {
            document.getElementById("hero-hp-bar").value = heroHP; document.getElementById("hero-hp-text").innerText = heroHP;
            if (heroHP === 0) { clearInterval(enemyAttackInterval); alert("टीम हार गई!"); }
        }

        function updateEnemyHealth() {
            document.getElementById("enemy-hp-bar").value = enemyHP; document.getElementById("enemy-hp-text").innerText = enemyHP;
            if (enemyHP === 0) {
                clearInterval(enemyAttackInterval); enemyEl.style.display = "none"; 
                setTimeout(() => alert("लेवल 1 पार! दुश्मन ख़त्म।"), 500);
            }
        }
    </script>
</body>
</html>
