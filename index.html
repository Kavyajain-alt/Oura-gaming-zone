  <!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>गेम + एडमिन पैनल</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background-color: #2c3e50; color: white; text-align: center; user-select: none; }
        
        /* --- मेनू और एडमिन स्क्रीन का डिज़ाइन --- */
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; background-color: #2c3e50; }
        #main-menu { display: flex; flex-direction: column; justify-content: center; align-items: center; }
        h1 { color: #f1c40f; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 20px; font-weight: bold; border-radius: 10px; border: none; cursor: pointer; width: 80%; max-width: 300px; }
        .btn-play { background-color: #2ecc71; color: white; }
        .btn-admin { background-color: #e74c3c; color: white; }
        
        input { padding: 10px; font-size: 16px; border-radius: 5px; margin: 10px 0; width: 80%; max-width: 300px; }
        .admin-box { background: white; color: black; padding: 20px; border-radius: 10px; display: inline-block; width: 90%; max-width: 400px; margin-top: 50px; }

        /* --- गेम का डिज़ाइन --- */
        #game-world { background-image: linear-gradient(to bottom, #87CEEB 60%, #228B22 100%); height: 60vh; position: relative; }
        #hero, #enemy { position: absolute; bottom: 20px; width: 80px; height: 80px; transition: 0.3s; }
        #hero { left: 50px; } #enemy { right: 50px; }
        #controls-area { height: 40vh; background: #34495e; display: flex; justify-content: space-around; align-items: center; }
        .game-btn { background: rgba(255,255,255,0.2); border: 2px solid white; border-radius: 50%; width: 60px; height: 60px; font-size: 24px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; }
        .attack-btn { background: #e74c3c; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen" style="display: flex;">
        <h1>रोबोट वॉर्स 🤖</h1>
        <p>आपका स्वागत है!</p>
        <button class="btn btn-play" onclick="tryStartGame()">🎮 गेम खेलें</button>
        <button class="btn btn-admin" onclick="showScreen('admin-login')">⚙️ एडमिन</button>
    </div>

    <div id="admin-login" class="screen">
        <div class="admin-box">
            <h2>एडमिन लॉगिन 🔐</h2>
            <input type="password" id="adminPass" placeholder="पासवर्ड डालें (admin123)">
            <br>
            <button class="btn btn-admin" onclick="checkPassword()">लॉगिन करें</button>
            <button class="btn" style="background:gray; color:white;" onclick="showScreen('main-menu')">वापस जाएं</button>
        </div>
    </div>

    <div id="admin-dashboard" class="screen">
        <div class="admin-box">
            <h2>कंट्रोल रूम 👑</h2>
            <p>गेम का स्टेटस: <strong id="lock-status" style="color: green;">खुला है 🟢</strong></p>
            <button class="btn btn-admin" onclick="toggleLock(true)">🔒 गेम लॉक करें</button>
            <button class="btn btn-play" onclick="toggleLock(false)">🔓 गेम अनलॉक करें</button>
            <br>
            <button class="btn" style="background:gray; color:white;" onclick="showScreen('main-menu')">मेन मेनू में जाएं</button>
        </div>
    </div>

    <div id="game-screen" class="screen" style="padding: 0;">
        <div id="game-world">
            <button style="position:absolute; top:10px; right:10px; z-index:10;" onclick="showScreen('main-menu')">❌ बंद करें</button>
            <img id="hero" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Felix">
            <img id="enemy" src="https://api.dicebear.com/7.x/bottts/svg?seed=Robot">
        </div>
        <div id="controls-area">
            <div class="game-btn" onclick="moveHero('left')">⬅️</div>
            <div class="game-btn" onclick="moveHero('right')">➡️</div>
            <div class="game-btn attack-btn" onclick="heroAttack()">⚔️</div>
        </div>
    </div>

    <script>
        // गेम लॉक है या नहीं, इसका रिकॉर्ड
        let isGameLocked = false;

        // स्क्रीन बदलने का फंक्शन
        function showScreen(screenId) {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-dashboard').style.display = 'none';
            document.getElementById('game-screen').style.display = 'none';
            
            // जो स्क्रीन मांगी है, बस उसे दिखाओ
            if(screenId === 'main-menu') {
                document.getElementById(screenId).style.display = 'flex';
            } else {
                document.getElementById(screenId).style.display = 'block';
            }
        }

        // पासवर्ड चेक करना
        function checkPassword() {
            let pass = document.getElementById('adminPass').value;
            if (pass === "admin123") {
                showScreen('admin-dashboard');
                document.getElementById('adminPass').value = ""; // पासवर्ड बॉक्स खाली कर दो
            } else {
                alert("गलत पासवर्ड!");
            }
        }

        // गेम को लॉक/अनलॉक करना
        function toggleLock(lockState) {
            isGameLocked = lockState;
            let statusText = document.getElementById('lock-status');
            
            if (isGameLocked) {
                statusText.innerHTML = "लॉक है 🔴";
                statusText.style.color = "red";
                alert("गेम लॉक कर दिया गया है! अब बच्चे इसे नहीं खेल पाएंगे।");
            } else {
                statusText.innerHTML = "खुला है 🟢";
                statusText.style.color = "green";
                alert("गेम अनलॉक हो गया है! अब बच्चे खेल सकते हैं।");
            }
        }

        // बच्चे जब 'गेम खेलें' दबाएं
        function tryStartGame() {
            if (isGameLocked) {
                alert("🚫 माफ़ करें! एडमिन ने अभी गेम बंद (Lock) किया हुआ है। बाद में आएं!");
            } else {
                showScreen('game-screen');
            }
        }

        // --- गेम खेलने का लॉजिक ---
        let heroPos = 50;
        function moveHero(dir) {
            let hero = document.getElementById('hero');
            if (dir === 'right') heroPos += 20;
            if (dir === 'left') heroPos -= 20;
            hero.style.left = heroPos + 'px';
        }

        function heroAttack() {
            let hero = document.getElementById('hero');
            hero.style.transform = "rotate(20deg) scale(1.2)";
            setTimeout(() => { hero.style.transform = "rotate(0deg) scale(1)"; }, 200);
            alert("💥 हमला किया!");
        }
    </script>
</body>
</html>
