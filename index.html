<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ओरिजिनल गेम फील - Level 1</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Arial', sans-serif; background-color: #2c3e50; color: white; user-select: none; }
        
        .screen { display: none; position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; padding: 20px; box-sizing: border-box; }
        #main-menu { display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #1a252f; }
        h1 { color: #f1c40f; text-shadow: 2px 2px 5px black; font-size: 35px; }
        .btn { padding: 15px 30px; margin: 10px; font-size: 20px; font-weight: bold; border-radius: 10px; border: 2px solid white; cursor: pointer; width: 80%; max-width: 300px; box-shadow: 0px 5px 0px rgba(0,0,0,0.5); }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn-play { background-color: #2ecc71; color: white; }

        #game-world { background-image: linear-gradient(to bottom, #4b7bec 50%, #38ada9 50%, #079992 100%); height: 60vh; position: relative; overflow: hidden; border-bottom: 5px solid #1e272e; }
        
        /* 🌟 ओरिजिनल फील के लिए एनीमेशन 🌟 */
        #hero, #enemy { 
            position: absolute; 
            bottom: 20px; 
            height: 90px; 
            transition: left 0.2s linear, transform 0.1s; 
            /* साँस लेने का इफ़ेक्ट */
            animation: breathe 1.5s infinite alternate ease-in-out;
            /* असली दिखने के लिए परछाई */
            filter: drop-shadow(0px 10px 5px rgba(0,0,0,0.4)); 
        }
        #hero { left: 50px; z-index: 10; } 
        #enemy { right: 50px; animation-delay: 0.5s; }

        /* साँस लेने (हिलने) का CSS जादू */
        @keyframes breathe {
            0% { transform: scaleY(1) translateY(0px); }
            100% { transform: scaleY(0.95) translateY(3px); }
        }

        /* चलते समय हिलने का इफ़ेक्ट */
        .walking { animation: walk 0.3s infinite alternate !important; }
        @keyframes walk {
            0% { transform: rotate(-10deg) translateY(-5px); }
            100% { transform: rotate(10deg) translateY(0px); }
        }

        #controls-area { height: 40vh; background: #1e272e; display: flex; justify-content: space-around; align-items: center; }
        .game-btn { background: rgba(255,255,255,0.1); border: 2px solid #bdc3c7; border-radius: 50%; width: 65px; height: 65px; font-size: 28px; color: white; cursor: pointer; display: flex; justify-content: center; align-items: center; box-shadow: 0px 5px 0px #000; }
        .game-btn:active { transform: translateY(5px); box-shadow: none; }
        .attack-btn { background: #e74c3c; border-color: #c0392b; box-shadow: 0px 5px 0px #80140a; }
    </style>
</head>
<body>

    <div id="main-menu" class="screen" style="display: flex;">
        <h1>रोबोट वॉर्स 🤖</h1>
        <button class="btn btn-play" onclick="startGame()">🎮 गेम खेलें</button>
    </div>

    <div id="game-screen" class="screen" style="padding: 0;">
        <div id="game-world">
            <button style="position:absolute; top:10px; right:10px; z-index:20; background:red; color:white; border:none; padding:8px 15px; border-radius:5px; font-weight:bold;" onclick="closeGame()">❌ बंद करें</button>
            
            <img id="hero" src="https://api.dicebear.com/7.x/adventurer/svg?seed=Ninja" alt="Hero">
            <img id="enemy" src="https://api.dicebear.com/7.x/bottts/svg?seed=EvilBot" alt="Enemy">
        </div>
        <div id="controls-area">
            <div class="game-btn" ontouchstart="moveHero('left')" onmousedown="moveHero('left')" ontouchend="stopHero()" onmouseup="stopHero()">⬅️</div>
            <div class="game-btn" ontouchstart="moveHero('right')" onmousedown="moveHero('right')" ontouchend="stopHero()" onmouseup="stopHero()">➡️</div>
            <div class="game-btn attack-btn" ontouchstart="heroAttack()" onmousedown="heroAttack()">⚔️</div>
        </div>
    </div>

    <script>
        function startGame() {
            document.documentElement.requestFullscreen().catch((e) => console.log(e));
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-screen').style.display = 'block';
        }

        function closeGame() {
            if (document.exitFullscreen) document.exitFullscreen();
            document.getElementById('game-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }

        let heroPos = 50;
        let heroEl = document.getElementById('hero');

        function moveHero(dir) {
            heroEl.classList.add('walking'); // चलते समय पैर हिलेंगे
            if (dir === 'right') heroPos += 30;
            if (dir === 'left') heroPos -= 30;
            heroEl.style.left = heroPos + 'px';
        }

        function stopHero() {
            heroEl.classList.remove('walking'); // रुकने पर वापस साँस लेने लगेगा
        }

        function heroAttack() {
            heroEl.style.transform = "rotate(30deg) scale(1.3) translateX(20px)";
            setTimeout(() => { heroEl.style.transform = "none"; }, 200);
        }
    </script>
</body>
</html>
